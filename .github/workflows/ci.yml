name: CI
on:
    pull_request:
        branches: [main, dev]
    push:
        branches: [dev]

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version: 20, cache: pnpm }
            - run: pnpm install --frozen-lockfile
            - run: pnpm lint

    typecheck:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version: 20, cache: pnpm }
            - run: pnpm install --frozen-lockfile
            - run: pnpm typecheck

    generated-docs:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version: 20, cache: pnpm }
            - run: pnpm install --frozen-lockfile
            - run: pnpm docs:check

    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version: 20, cache: pnpm }
            - run: pnpm install --frozen-lockfile
            - run: pnpm build --filter @dds/emerald-tokens
            - run: pnpm test --filter @dds/emerald

    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with: { node-version: 20, cache: pnpm }
            - run: pnpm install --frozen-lockfile
            - run: pnpm build
            - run: pnpm check:dist
